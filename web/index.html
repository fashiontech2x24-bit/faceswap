<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GHOST Face Swap</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
      color: #fff;
    }

    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 2.5rem; }

    /* ── Upload zones ────────────────────────────────────────────────── */
    .uploads {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      width: 100%;
      max-width: 800px;
    }

    .zone {
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 1.5rem;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      min-height: 220px;
      position: relative;
    }

    .zone:hover, .zone.drag-over { border-color: #7c6af7; background: #1a1830; }
    .zone input[type="file"] { display: none; }

    .zone-label { font-weight: 600; font-size: 1rem; color: #ccc; }
    .zone-hint  { font-size: 0.75rem; color: #555; text-align: center; }

    .zone-icon {
      font-size: 2.5rem;
      line-height: 1;
      opacity: .5;
    }

    .zone-preview {
      width: 100%;
      max-height: 180px;
      object-fit: contain;
      border-radius: 8px;
      display: none;
    }

    .zone.has-image .zone-icon,
    .zone.has-image .zone-hint { display: none; }
    .zone.has-image .zone-preview { display: block; }
    .zone.has-image .zone-label   { align-self: flex-start; font-size: 0.8rem; color: #888; }

    /* ── Swap button ─────────────────────────────────────────────────── */
    .actions {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    #swap-btn {
      padding: 0.75rem 3rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #7c6af7;
      color: #fff;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      width: 100%;
      max-width: 320px;
    }

    #swap-btn:hover:not(:disabled) { background: #6a59d1; }
    #swap-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Status bar ──────────────────────────────────────────────────── */
    #status-bar {
      font-size: 0.85rem;
      color: #888;
      min-height: 1.2rem;
      text-align: center;
    }

    #status-bar.error { color: #f87171; }
    #status-bar.ok    { color: #4ade80; }

    /* ── Progress dots ───────────────────────────────────────────────── */
    .dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* ── Result section ──────────────────────────────────────────────── */
    #result-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
      width: 100%;
      max-width: 800px;
    }

    #result-section h2 { font-size: 1.1rem; color: #aaa; align-self: flex-start; }

    #result-img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #222;
    }

    #download-btn {
      padding: 0.6rem 2rem;
      border-radius: 8px;
      background: #1e1e1e;
      color: #7c6af7;
      border: 1px solid #7c6af7;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background .2s;
    }

    #download-btn:hover { background: #2a2040; }

    @media (max-width: 540px) {
      .uploads { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>GHOST Face Swap</h1>
  <p class="subtitle">Powered by ai-forever/ghost — face auto-crop included</p>

  <div class="uploads">
    <!-- Target -->
    <div class="zone" id="target-zone" onclick="document.getElementById('target-input').click()">
      <div class="zone-icon">🖼️</div>
      <div class="zone-label">Target Image</div>
      <div class="zone-hint">The image where the face<br>will be replaced</div>
      <input type="file" id="target-input" accept="image/*" />
      <img class="zone-preview" id="target-preview" alt="target preview" />
    </div>

    <!-- Source -->
    <div class="zone" id="source-zone" onclick="document.getElementById('source-input').click()">
      <div class="zone-icon">🧑</div>
      <div class="zone-label">Source Face</div>
      <div class="zone-hint">The donor face — will be<br>auto-detected &amp; cropped</div>
      <input type="file" id="source-input" accept="image/*" />
      <img class="zone-preview" id="source-preview" alt="source preview" />
    </div>
  </div>

  <div class="actions">
    <button id="swap-btn" disabled>Swap Faces</button>
    <div id="status-bar"></div>
  </div>

  <div id="result-section">
    <h2>Result</h2>
    <img id="result-img" alt="swapped result" />
    <a id="download-btn" href="#" download="swapped.jpg">Download</a>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    // ── State ─────────────────────────────────────────────────────────────
    let targetFile = null;
    let sourceFile = null;
    let pollTimer  = null;

    // ── Upload zone wiring ────────────────────────────────────────────────
    setupZone('target', file => { targetFile = file; });
    setupZone('source', file => { sourceFile = file; });

    function setupZone(name, onFile) {
      const zone    = $(`${name}-zone`);
      const input   = $(`${name}-input`);
      const preview = $(`${name}-preview`);

      input.addEventListener('change', () => {
        if (input.files[0]) selectFile(input.files[0]);
      });

      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) selectFile(file);
      });

      function selectFile(file) {
        onFile(file);
        const reader = new FileReader();
        reader.onload = e => {
          preview.src = e.target.result;
          zone.classList.add('has-image');
        };
        reader.readAsDataURL(file);
        checkReady();
      }
    }

    function checkReady() {
      $('swap-btn').disabled = !(targetFile && sourceFile);
    }

    // ── Swap ──────────────────────────────────────────────────────────────
    $('swap-btn').addEventListener('click', async () => {
      if (!targetFile || !sourceFile) return;

      setStatus('Uploading images', 'dots');
      $('swap-btn').disabled = true;
      $('result-section').style.display = 'none';

      const form = new FormData();
      form.append('target', targetFile);
      form.append('source', sourceFile);

      let jobId;
      try {
        const res = await fetch('/api/swap', { method: 'POST', body: form });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const data = await res.json();
        jobId = data.job_id;
      } catch (err) {
        setStatus('Upload failed: ' + err.message, 'error');
        $('swap-btn').disabled = false;
        return;
      }

      setStatus('Processing', 'dots');
      pollTimer = setInterval(() => poll(jobId), 1500);
    });

    async function poll(jobId) {
      try {
        const res  = await fetch(`/api/status/${jobId}`);
        const data = await res.json();

        if (data.status === 'done') {
          clearInterval(pollTimer);
          showResult(jobId);
        } else if (data.status === 'failed') {
          clearInterval(pollTimer);
          setStatus('Failed: ' + (data.error || 'unknown error'), 'error');
          $('swap-btn').disabled = false;
        }
      } catch {
        // network blip — keep polling
      }
    }

    function showResult(jobId) {
      const url = `/api/result/${jobId}`;
      $('result-img').src = url + '?t=' + Date.now();
      $('download-btn').href = url;
      $('result-section').style.display = 'flex';
      setStatus('Done!', 'ok');
      $('swap-btn').disabled = false;
    }

    // ── Helpers ───────────────────────────────────────────────────────────
    function setStatus(msg, cls) {
      const bar = $('status-bar');
      bar.className = cls || '';
      bar.innerHTML = msg + (cls === 'dots' ? '<span class="dots"></span>' : '');
    }
  </script>
</body>
</html>
